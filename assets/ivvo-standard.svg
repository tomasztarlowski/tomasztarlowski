<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1138"/>
      <stop offset="0.42" stop-color="#6d4d7a"/>
      <stop offset="0.78" stop-color="#b96f78"/>
      <stop offset="1" stop-color="#e8a87c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- moon -->
  <circle cx="195" cy="135" r="36" fill="#f6e7c1"/>
  <g fill="#e8a87c">
    <rect x="180" y="130" width="6" height="6"/>
    <rect x="200" y="142" width="4" height="4"/>
    <rect x="205" y="118" width="4" height="4"/>
  </g>

  <!-- stars -->
  <g fill="#f6e7c1">
    <rect x="80" y="60" width="3" height="3"/>
    <rect x="320" y="100" width="2" height="2"/>
    <rect x="540" y="40" width="3" height="3"/>
    <rect x="730" y="120" width="2" height="2"/>
    <rect x="920" y="65" width="3" height="3"/>
    <rect x="1080" y="150" width="2" height="2"/>
  </g>

  <!-- distant hills -->
  <polygon points="0,420 120,360 220,400 380,330 540,400 700,340 880,420 1050,360 1200,410 1200,470 0,470" fill="#32204d"/>
  <polygon points="0,460 140,400 280,440 480,400 660,460 850,410 1050,460 1200,440 1200,520 0,520" fill="#1a1138"/>

  <!-- ground -->
  <rect y="490" width="1200" height="140" fill="#0b0820"/>

  <!-- pylon -->
  <g fill="#0b0820">
    <rect x="600" y="430" width="3" height="60"/>
    <rect x="592" y="448" width="20" height="2"/>
    <rect x="588" y="460" width="28" height="2"/>
  </g>

  <!-- title -->
  <g font-family="'Silkscreen','Courier New',monospace" font-weight="700">
    <text x="60" y="320" font-size="220" letter-spacing="-6" fill="#f6e7c1">
      <tspan fill="#f6e7c1">I</tspan><tspan fill="#e8a87c">VV</tspan><tspan fill="#f6e7c1">O</tspan>
    </text>
  </g>

  <!-- bottom bar -->
  <rect x="0" y="588" width="1200" height="42" fill="#0b0820"/>
  <rect x="0" y="588" width="1200" height="3" fill="#e8a87c"/>
  <g font-family="'Jersey 20','Courier New',monospace" fill="#f6e7c1">
    <text x="32" y="617" font-size="22" letter-spacing="2">IVVO  ·  SOLO PROGRAMISTA  ·  CAŁY PRODUKT</text>
    <text x="1168" y="617" font-size="22" text-anchor="end" fill="#e8a87c">hello@ivvo.pl</text>
  </g>
</svg>
